<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#0D1B2A"/>

  <!-- Outer arc -->
  <path d="M20 62 A32 32 0 1 1 80 62" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Middle arc -->
  <path d="M27 65 A25 25 0 1 1 73 65" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 4" fill="none"/>

  <!-- Inner arc -->
  <path d="M34 68 A18 18 0 1 1 66 68" stroke="#93C5FD" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Center pivot -->
  <circle cx="50" cy="62" r="4.5" fill="#1E40AF" stroke="#60A5FA" stroke-width="1.5"/>

  <!-- Needle -->
  <line x1="50" y1="62" x2="72" y2="40" stroke="#BFDBFE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Needle tip -->
  <circle cx="72" cy="40" r="2" fill="#3B82F6"/>
</svg>
