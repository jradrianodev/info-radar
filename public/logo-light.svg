<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Outer arc -->
  <path d="M10 42 A22 22 0 1 1 54 42" stroke="#1E3A5F" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Inner arcs -->
  <path d="M15 44 A17 17 0 1 1 49 44" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M20 46 A12 12 0 1 1 44 46" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Center pivot -->
  <circle cx="32" cy="42" r="3.5" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.2"/>
  <!-- Needle -->
  <line x1="32" y1="42" x2="48" y2="25" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>
  <!-- Needle tip -->
  <circle cx="48" cy="25" r="1.5" fill="#3B82F6"/>

  <!-- "Info" in dark gray -->
  <text x="68" y="40" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="300" fill="#1F2937" letter-spacing="-0.5">Info</text>
  <!-- "Radar" in blue -->
  <text x="115" y="40" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#2563EB" letter-spacing="-0.5">Radar</text>
</svg>
